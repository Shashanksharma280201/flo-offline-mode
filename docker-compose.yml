version: '3.8'

services:
  mongodb:
    image: mongo:8.0.20
    container_name: flo-offline-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./docker/mongod.conf:/etc/mongo/mongod.conf:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    command: --config /etc/mongo/mongod.conf
    networks:
      - flo-offline-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 60s

  redis:
    image: redis:7.2-alpine
    container_name: flo-offline-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    networks:
      - flo-offline-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: flo-offline-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD}@mongodb:27017/flo_offline?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - flo-offline-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/build/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  flo-offline-network:
    driver: bridge
