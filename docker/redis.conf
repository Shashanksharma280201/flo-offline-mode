# Redis Configuration for Offline Mode Container
# noeviction policy required for BullMQ job queue reliability

# Memory management
maxmemory 256mb
maxmemory-policy noeviction

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000

# AOF (Append-Only File) for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Logging
loglevel notice

# Network
bind 0.0.0.0
port 6379

# Security
protected-mode yes
requirepass ""
