# MongoDB Configuration for Offline Mode Container
# Prevents OOM killer by explicitly limiting WiredTiger cache

storage:
  dbPath: /data/db
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.5

net:
  bindIp: 0.0.0.0
  port: 27017

# Security
security:
  authorization: enabled

# Operational settings
operationProfiling:
  mode: off
